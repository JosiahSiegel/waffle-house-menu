# .github/workflows/deploy.yml
# GitHub Pages per-PR previews, all on a single gh-pages branch.
#
# Layout:
#   gh-pages/
#     index.html, data/, filter.mjs, ...   ← main site (root)
#     pr-2/                                ← preview of PR #2
#     pr-N/                                ← preview of PR #N
#
# The main site stays at https://wafflestats.com/.
# PR previews live at   https://wafflestats.com/pr-N/.
#
# How relative paths work for previews:
#   Each PR's index.html gets <base href="/pr-N/"> injected at the
#   top of <head>, so `data/menu.js` resolves to /pr-N/data/menu.js
#   instead of /data/menu.js (which would 404 on a real sub-path).
#
# How cleanup works:
#   On PR close, the pr-N/ directory is removed from gh-pages.
#
# Page source for GitHub Pages is set to the `gh-pages` branch
# (was `main` before this workflow landed). The first push to
# gh-pages copied main's tree verbatim, so the switch is
# byte-for-byte equivalent — no downtime.

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.action != 'closed' || github.event.pull_request.head.repo.full_name == 'JosiahSiegel/waffle-house-menu'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Classify event
        id: cls
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "is_pr=true"          >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.action }}"   >> "$GITHUB_OUTPUT"
          else
            echo "is_pr=false"         >> "$GITHUB_OUTPUT"
            echo "action=push"         >> "$GITHUB_OUTPUT"
          fi

      # Skip the build step on PR close: there's nothing to copy
      # in, we just need the deploy step to remove the pr-N/ dir.
      - name: Build site tree
        if: steps.cls.outputs.action != 'closed'
        run: |
          mkdir -p build
          if [ "${{ steps.cls.outputs.is_pr }}" = "true" ]; then
            PR_N=${{ steps.cls.outputs.pr_number }}
            mkdir -p "build/pr-${PR_N}"
            # Copy everything except the deploy workflow itself
            # (we don't want recursive workflow triggers).
            rsync -a --exclude='.github' --exclude='node_modules' ./ "build/pr-${PR_N}/"
            # Inject <base href> right before </head> so relative
            # paths resolve under /pr-N/.
            sed -i "s|</head>|  <base href=\"/pr-${PR_N}/\">\n  </head>|" "build/pr-${PR_N}/index.html"
          else
            rsync -a --exclude='.github' --exclude='node_modules' ./ build/
          fi

      - name: Deploy to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.email "bot@wafflestats.com"
          git config --global user.name  "wafflestats-bot"

          # Clone the existing gh-pages branch so we can mutate it
          # in place (peaceiris/actions-gh-pages can only add, not
          # delete — we need delete for PR-close cleanup).
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/JosiahSiegel/waffle-house-menu.git" \
            gh-pages

          cd gh-pages

          # Preserve CNAME if main is the source of truth for it.
          # (It is — main ships a CNAME = wafflestats.com file.)
          if [ -f ../CNAME ]; then
            cp ../CNAME .
          fi

          if [ "${{ steps.cls.outputs.is_pr }}" = "true" ]; then
            PR_N=${{ steps.cls.outputs.pr_number }}
            # Always start from a clean slate for this PR's dir.
            rm -rf "pr-${PR_N}"
            if [ "${{ steps.cls.outputs.action }}" != "closed" ]; then
              mkdir -p "pr-${PR_N}"
              cp -r ../build/pr-${PR_N}/. "pr-${PR_N}/"
            fi
            MSG="deploy: PR #${PR_N} ${{ steps.cls.outputs.action }}"
          else
            # Production deploy: replace everything except pr-*
            # (we never want a main deploy to nuke live previews).
            find . -mindepth 1 -maxdepth 1 \
              ! -name 'pr-*' ! -name '.git' ! -name 'CNAME' \
              -exec rm -rf {} +
            cp -r ../build/. .
            MSG="deploy: main @ ${{ github.sha }}"
          fi

          # If nothing changed (e.g. close after a re-open), bail.
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi

          git add -A
          git commit -m "$MSG"
          git push origin gh-pages
