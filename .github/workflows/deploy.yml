# .github/workflows/deploy.yml
# GitHub Pages per-PR previews, all on a single gh-pages branch.
#
# Layout:
#   gh-pages/
#     index.html, data/, filter.mjs, ...   ← main site (root)
#     pr-2/                                ← preview of PR #2
#     pr-N/                                ← preview of PR #N
#
# The main site stays at https://wafflestats.com/.
# PR previews live at   https://wafflestats.com/pr-N/.
#
# How relative paths work for previews:
#   Each PR's index.html gets <base href="/pr-N/"> injected at the
#   top of <head>, so `data/menu.js` resolves to /pr-N/data/menu.js
#   instead of /data/menu.js (which would 404 on a real sub-path).
#
# How cleanup works:
#   On PR close, the pr-N/ directory is removed from gh-pages.

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Classify event
        id: cls
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "is_pr=true"          >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.action }}"   >> "$GITHUB_OUTPUT"
          else
            echo "is_pr=false"         >> "$GITHUB_OUTPUT"
            echo "action=push"         >> "$GITHUB_OUTPUT"
          fi

      # --- 1. Get the PR/main source into a known directory ---
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          path: src

      # --- 2. Build into ./build (skip for PR close) ---
      - name: Build site tree
        if: steps.cls.outputs.action != 'closed'
        working-directory: src
        run: |
          mkdir -p ../build
          if [ "${{ steps.cls.outputs.is_pr }}" = "true" ]; then
            PR_N=${{ steps.cls.outputs.pr_number }}
            mkdir -p "../build/pr-${PR_N}"
            # Copy everything except .github (no recursive workflow triggers)
            # and CNAME (it's owned by the main site at root, not by previews).
            tar --exclude='.github' --exclude='CNAME' -cf - . \
              | tar -xf - -C "../build/pr-${PR_N}/"
            # Inject <base href> right before </head>
            sed -i "s|</head>|  <base href=\"/pr-${PR_N}/\">\n  </head>|" \
              "../build/pr-${PR_N}/index.html"
          else
            tar --exclude='.github' -cf - . | tar -xf - -C ../build/
          fi

      # --- 3. Get the gh-pages branch into a known directory ---
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1
          path: gh-pages-src
          # Don't fail the run if the branch is brand new (first deploy)
          continue-on-error: false

      - name: Ensure CNAME present in gh-pages
        working-directory: gh-pages-src
        run: |
          if [ ! -f CNAME ] && [ -f ../src/CNAME ]; then
            cp ../src/CNAME CNAME
            echo "CNAME copied from src"
          else
            echo "CNAME already in place"
          fi

      # --- 4. Mutate gh-pages-src in place ---
      - name: Update gh-pages
        run: |
          if [ "${{ steps.cls.outputs.is_pr }}" = "true" ]; then
            PR_N=${{ steps.cls.outputs.pr_number }}
            cd gh-pages-src
            rm -rf "pr-${PR_N}"
            if [ "${{ steps.cls.outputs.action }}" != "closed" ]; then
              mkdir -p "pr-${PR_N}"
              cp -r "../build/pr-${PR_N}/." "pr-${PR_N}/"
            fi
            MSG="deploy: PR #${PR_N} ${{ steps.cls.outputs.action }}"
          else
            cd gh-pages-src
            # Production deploy: wipe everything except pr-* dirs and CNAME
            find . -mindepth 1 -maxdepth 1 \
              ! -name 'pr-*' ! -name '.git' ! -name 'CNAME' \
              -exec rm -rf {} +
            cp -r ../build/. .
            MSG="deploy: main @ ${{ github.sha }}"
          fi

      # --- 5. Commit and push ---
      - name: Commit and push
        working-directory: gh-pages-src
        run: |
          git config user.email "bot@wafflestats.com"
          git config user.name  "wafflestats-bot"

          if git diff --cached --quiet && git status --porcelain | grep -q '^??'; then
            # new untracked files (e.g. brand new pr-N/) — stage them
            git add -A
          elif git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          else
            git add -A
          fi

          git commit -m "$MSG"
          git push origin gh-pages
